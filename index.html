<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SentinelAI</title>

<style>

body{
margin:0;
background:#020617;
overflow:hidden;
}

/* background container */

.cyber-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:radial-gradient(circle at center,#022c3a,#020617 70%);
overflow:hidden;
}

/* moving light streaks */

.streak{
position:absolute;
width:2px;
height:200px;
background:linear-gradient(transparent,cyan,transparent);
opacity:0.5;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-200px)}
100%{transform:translateY(110vh)}
}

/* network nodes */

.node{
position:absolute;
width:6px;
height:6px;
background:cyan;
border-radius:50%;
box-shadow:0 0 10px cyan;
animation:pulse 3s infinite ease-in-out;
}

@keyframes pulse{
0%{opacity:0.3;transform:scale(1)}
50%{opacity:1;transform:scale(1.4)}
100%{opacity:0.3;transform:scale(1)}
}

/* attack lines */

.line{
position:absolute;
height:1px;
background:rgba(0,255,255,0.3);
transform-origin:left;
animation:scan 8s linear infinite;
}

@keyframes scan{
0%{opacity:0}
50%{opacity:0.8}
100%{opacity:0}
}

/* AI glow pulse */

.ai-glow{
position:absolute;
top:40%;
left:25%;
width:400px;
height:400px;
background:radial-gradient(circle,rgba(0,255,255,0.25),transparent 70%);
animation:aiPulse 4s infinite ease-in-out;
}

@keyframes aiPulse{
0%{transform:scale(1);opacity:0.4}
50%{transform:scale(1.2);opacity:0.8}
100%{transform:scale(1);opacity:0.4}
}

</style>

</head>

<body>

<div class="cyber-bg">

<div class="ai-glow"></div>

<!-- streaks -->

<div class="streak" style="left:10%;animation-delay:0s"></div>
<div class="streak" style="left:30%;animation-delay:2s"></div>
<div class="streak" style="left:50%;animation-delay:4s"></div>
<div class="streak" style="left:70%;animation-delay:1s"></div>
<div class="streak" style="left:90%;animation-delay:3s"></div>

<!-- network nodes -->

<div class="node" style="top:20%;left:15%"></div>
<div class="node" style="top:35%;left:25%"></div>
<div class="node" style="top:50%;left:40%"></div>
<div class="node" style="top:65%;left:20%"></div>
<div class="node" style="top:40%;left:60%"></div>
<div class="node" style="top:70%;left:75%"></div>

<!-- attack lines -->

<div class="line" style="top:30%;left:10%;width:300px;transform:rotate(20deg)"></div>
<div class="line" style="top:60%;left:35%;width:250px;transform:rotate(-15deg)"></div>
<div class="line" style="top:50%;left:60%;width:200px;transform:rotate(10deg)"></div>

</div>

<div id="root"></div>

<script type="module" src="/src/main.jsx"></script>

</body>
</html>
